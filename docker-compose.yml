version: '3.8'

services:
  ingress:
    image: nginx:alpine
    container_name: logistics_ingress
    ports:
      - '80:80'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - host-app
      - login-app
      - dashboard-app
      - ui-library
      - backend-api
    restart: unless-stopped

  host-app:
    image: ${SCW_REGISTRY}/${SCW_NAMESPACE}/host-app:${IMAGE_TAG:-latest}
    container_name: logistics_host_app
    environment:
      - VITE_UI_LIBRARY_URL=${VITE_UI_LIBRARY_URL}
      - VITE_LOGIN_APP_URL=${VITE_LOGIN_APP_URL}
      - VITE_DASHBOARD_APP_URL=${VITE_DASHBOARD_APP_URL}
      - VITE_API_URL=${VITE_API_URL}
    restart: unless-stopped

  login-app:
    image: ${SCW_REGISTRY}/${SCW_NAMESPACE}/login-app:${IMAGE_TAG:-latest}
    container_name: logistics_login_app
    environment:
      - VITE_LOGIN_APP_URL=${VITE_LOGIN_APP_URL}
      - VITE_API_URL=${VITE_API_URL}
    restart: unless-stopped

  dashboard-app:
    image: ${SCW_REGISTRY}/${SCW_NAMESPACE}/dashboard-app:${IMAGE_TAG:-latest}
    container_name: logistics_dashboard_app
    environment:
      - VITE_DASHBOARD_APP_URL=${VITE_DASHBOARD_APP_URL}
      - VITE_API_URL=${VITE_API_URL}
    restart: unless-stopped

  ui-library:
    image: ${SCW_REGISTRY}/${SCW_NAMESPACE}/ui-library:${IMAGE_TAG:-latest}
    container_name: logistics_ui_library
    restart: unless-stopped

  backend-api:
    image: ${SCW_REGISTRY}/${SCW_NAMESPACE}/backend-api:${IMAGE_TAG:-latest}
    container_name: logistics_backend_api
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-15m}
      - JWT_REFRESH_EXPIRES_IN=${JWT_REFRESH_EXPIRES_IN:-7d}
      - PORT=3000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: warehousedb
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-warehouseuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-warehousedb}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-warehouseuser} -d ${POSTGRES_DB:-warehousedb}']
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
