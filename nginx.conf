events {
    worker_connections 1024;
}

http {
    include mime.types;

    server {
        listen 80;
        server_name localhost;

        # ── Micro-Frontend Remote Assets ──
        # Prefixed with /mf/ to avoid collision with SPA routes
        # (e.g. /dashboard is an SPA route, /mf/dashboard/ serves MF bundles)

        location /mf/login/ {
            proxy_pass http://login-app:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /mf/dashboard/ {
            proxy_pass http://dashboard-app:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /mf/ui-library/ {
            proxy_pass http://ui-library:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Backend API ──
        location /api/ {
            proxy_pass http://backend-api:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Frontend Host App (SPA catch-all) ──
        # Must be last so /mf/* and /api/* match first.
        # All SPA routes (/dashboard, /register, etc.) fall through here
        # and host-app's internal nginx serves index.html via try_files.
        location / {
            proxy_pass http://host-app:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
