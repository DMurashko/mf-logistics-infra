name: Deploy to Scaleway

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (commit SHA or "latest")'
        required: false
        default: 'latest'

env:
  DEPLOY_PATH: /opt/logistics-app

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4

      - name: Copy docker-compose and nginx config to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SCW_HOST }}
          username: ${{ secrets.SCW_USER }}
          key: ${{ secrets.SCW_SSH_KEY }}
          source: 'docker-compose.yml,nginx.conf'
          target: ${{ env.DEPLOY_PATH }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SCW_HOST }}
          username: ${{ secrets.SCW_USER }}
          key: ${{ secrets.SCW_SSH_KEY }}
          script: |
            set -e
            cd /opt/logistics-app

            source .env

            # ── Override IMAGE_TAG if provided ──
            export IMAGE_TAG="${IMAGE_TAG}"

            # ── Login to Scaleway Container Registry ──
            echo "${SCW_SECRET_KEY}" | docker login "${SCW_REGISTRY}" -u nologin --password-stdin

            # ── Pull latest images ──
            docker compose pull

            # ── Deploy ──
            docker compose up -d --remove-orphans

            # ── Clean up old images ──
            docker image prune -f

            echo "Deployment complete"
